<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hyperliquid Terminal · TWAP Flow + Markets</title>
<meta name="description" content="Dense Hyperliquid terminal — live TWAP order flow, open interest, funding and volume across every market." />
<style>
  :root {
    --bg: #06080d; --bg2: #0a0d14; --panel: #0e1219; --panel2: #131822; --panel3: #1a212e;
    --border: #1c2430; --border2: #283242;
    --text: #e6e9f1; --muted: #828ca1; --faint: #5a6478; --faintest: #3d4658;
    --buy: #2ebd96; --buy2: #34d8ac; --buy-dim: rgba(46,189,150,.10);
    --sell: #f0616d; --sell2: #ff7a85; --sell-dim: rgba(240,97,109,.10);
    --accent: #7c8cff; --warn: #e6b450;
    --mono: "SF Mono","JetBrains Mono","Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  * { box-sizing: border-box; }
  html,body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  ::selection { background: rgba(124,140,255,.3); }
  ::-webkit-scrollbar { height: 9px; width: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ===== top bar ===== */
  .topbar {
    position: sticky; top: 0; z-index: 40; display: flex; align-items: stretch;
    background: var(--bg2); border-bottom: 1px solid var(--border); height: 42px;
  }
  .brand { display: flex; align-items: center; gap: 8px; padding: 0 14px; border-right: 1px solid var(--border); }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--buy); box-shadow: 0 0 6px var(--buy); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .brand b { font-size: 13px; font-weight: 700; letter-spacing: .4px; }
  .brand b span { color: var(--accent); }
  /* tabs */
  .tabs { display: flex; align-items: stretch; }
  .tab {
    display: flex; align-items: center; gap: 6px; padding: 0 16px; cursor: pointer;
    color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
    border-right: 1px solid var(--border); border-bottom: 2px solid transparent; background: none; font-family: inherit;
  }
  .tab:hover { color: var(--text); background: var(--panel); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--panel); }
  /* live stat strip */
  .strip { display: flex; align-items: center; gap: 0; overflow-x: auto; flex: 1; }
  .stat { display: flex; flex-direction: column; justify-content: center; padding: 0 15px; border-right: 1px solid var(--border); white-space: nowrap; min-width: max-content; }
  .stat .k { font-size: 8.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .7px; font-weight: 700; }
  .stat .v { font-size: 13.5px; font-weight: 700; font-family: var(--mono); margin-top: 2px; letter-spacing: -.2px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; padding: 0 14px; margin-left: auto; border-left: 1px solid var(--border); }
  .updated { color: var(--faint); font-size: 11px; white-space: nowrap; }
  .updated b { color: var(--muted); font-weight: 600; }
  .auto { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; cursor: pointer; user-select: none; white-space: nowrap; }
  .switch { position: relative; width: 28px; height: 15px; border-radius: 8px; background: var(--panel3); border: 1px solid var(--border2); transition: .15s; }
  .switch::after { content:''; position: absolute; top: 1px; left: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--muted); transition: .15s; }
  .auto input { display: none; }
  .auto input:checked + .switch { background: var(--buy-dim); border-color: var(--buy); }
  .auto input:checked + .switch::after { transform: translateX(13px); background: var(--buy); }
  button.rf { display: inline-flex; align-items: center; gap: 6px; background: var(--panel3); border: 1px solid var(--border2); color: var(--text); padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
  button.rf:hover { border-color: var(--accent); color: #fff; }
  button.rf:disabled { opacity: .5; cursor: default; }
  button.rf svg { transition: transform .5s; }
  button.rf.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== controls ===== */
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .ctl-label { color: var(--faintest); font-size: 9px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
  .search-box { position: relative; }
  .search-box svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
  input[type=text] { width: 210px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 9px 6px 27px; border-radius: 6px; font-size: 12px; outline: none; font-family: inherit; }
  input[type=text]:focus { border-color: var(--accent); }
  select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 12px; outline: none; cursor: pointer; font-family: inherit; }
  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .seg button { background: transparent; border: 0; border-right: 1px solid var(--border); color: var(--muted); padding: 6px 11px; cursor: pointer; font-size: 11.5px; font-weight: 600; font-family: inherit; }
  .seg button:last-child { border-right: 0; }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--panel3); color: #fff; }
  .chk { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11.5px; cursor: pointer; user-select: none; }
  .chk input { accent-color: var(--buy); width: 13px; height: 13px; }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
  .spacer { flex: 1; }
  .rowcount { color: var(--faint); font-size: 11px; font-family: var(--mono); }

  /* ===== tables ===== */
  .tablewrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 5px 12px; text-align: right; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  thead th {
    background: var(--bg2); color: var(--faint); font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px;
    font-weight: 700; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2; border-bottom: 1px solid var(--border2); padding-top: 8px; padding-bottom: 8px;
  }
  thead th:hover { color: var(--text); }
  thead th.nosort { cursor: default; }
  thead th .ar { color: var(--accent); font-size: 8px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .08s; }
  tbody tr.clk { cursor: pointer; }
  tbody tr:hover { background: var(--panel2); box-shadow: inset 2px 0 0 var(--accent); }
  td { font-size: 12px; }
  td.mono, th.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .tok { font-weight: 600; }
  td.tok { position: relative; }
  tr.clk td.tok::after { content:'›'; color: var(--accent); margin-left: 6px; opacity: 0; font-weight: 700; }
  tr.clk:hover td.tok::after { opacity: .8; }
  .badge { font-size: 9px; padding: 0 5px; border-radius: 4px; margin-left: 6px; border: 1px solid var(--border2); color: var(--faint); text-transform: uppercase; letter-spacing: .3px; }
  .buy { color: var(--buy); } .sell { color: var(--sell); }
  .up { color: var(--buy); } .down { color: var(--sell); }
  .dim { color: var(--faint); }
  .livedot { color: var(--buy); }
  .netcell { display: inline-flex; align-items: center; gap: 7px; justify-content: flex-end; }
  .nb { display: inline-block; height: 5px; border-radius: 2px; }
  .empty { padding: 50px; text-align: center; color: var(--muted); }
  .empty .big { color: var(--text); font-size: 14px; margin-bottom: 4px; }
  .err { padding: 40px; text-align: center; color: var(--sell); }
  .err button { margin-top: 12px; }
  /* mini bar in a cell (oi / vol) */
  .cellbar { position: relative; }
  .cellbar .fill { position: absolute; right: 0; top: 0; bottom: 0; background: var(--panel3); border-radius: 3px; z-index: 0; opacity: .55; }
  .cellbar span { position: relative; z-index: 1; }

  /* skeleton */
  .skelrow { height: 28px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .skelrow::after { content:''; position:absolute; inset:0; transform: translateX(-100%); background: linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent); animation: sh 1.2s infinite; }
  @keyframes sh { 100% { transform: translateX(100%); } }
  .loadline { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; padding: 10px 14px; }
  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }

  .foot { color: var(--faintest); font-size: 10.5px; padding: 12px 14px 30px; line-height: 1.7; }
  .foot code { background: var(--panel2); padding: 1px 4px; border-radius: 3px; color: var(--faint); }
  .foot a { color: var(--accent); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }

  /* ===== modal ===== */
  .backdrop { position: fixed; inset: 0; background: rgba(3,5,9,.72); backdrop-filter: blur(2px); display: none; z-index: 50; }
  .backdrop.open { display: block; }
  .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: min(820px,95vw); max-height: 88vh; overflow-y: auto; z-index: 51; background: var(--panel); border: 1px solid var(--border2); border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,.6); display: none; }
  .modal.open { display: block; }
  .mhead { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel2); z-index: 2; }
  .mhead h2 { margin: 0; font-size: 16px; font-weight: 700; }
  .mhead .x { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; border: 0; background: var(--panel3); width: 26px; height: 26px; border-radius: 6px; }
  .mhead .x:hover { color: #fff; }
  .msum { display: flex; flex-wrap: wrap; gap: 0; border-bottom: 1px solid var(--border); }
  .msum .i { padding: 10px 16px; border-right: 1px solid var(--border); }
  .msum .k { font-size: 9px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .msum b { display: block; font-size: 16px; font-weight: 700; font-family: var(--mono); margin-top: 2px; }
  .order { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .otop { display: flex; align-items: center; gap: 9px; font-size: 12px; }
  .side { font-weight: 700; padding: 2px 7px; border-radius: 4px; font-size: 10px; letter-spacing: .5px; }
  .side.b { background: var(--buy-dim); color: var(--buy); } .side.s { background: var(--sell-dim); color: var(--sell); }
  .otop .sz { font-weight: 600; font-family: var(--mono); }
  .otop .ago { margin-left: auto; color: var(--faint); font-size: 11px; }
  .st { font-size: 9px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border2); text-transform: uppercase; letter-spacing: .3px; color: var(--muted); }
  .st.active { color: var(--buy); border-color: var(--buy); background: var(--buy-dim); }
  .st.error { color: var(--sell); border-color: var(--sell); }
  .prog { margin-top: 8px; }
  .pbar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 3px; transition: width .3s; }
  .pmeta { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--faint); margin-top: 5px; }
  .pmeta .rem { color: var(--buy); font-family: var(--mono); font-weight: 600; }
  /* modal sections: chart + cross-venue */
  .msec { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .mseclbl { font-size: 9.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; margin-bottom: 9px; }
  .mseclbl.pad { padding: 12px 16px 0; }
  .mseclbl .dim { text-transform: none; letter-spacing: 0; font-weight: 500; font-family: var(--mono); }
  .chartbox { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; height: 96px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .chartbox.load, .chartbox.empty2 { color: var(--faint); font-size: 11px; }
  .spark { width: 100%; height: 100%; display: block; }
  .vtable { width: 100%; border-collapse: collapse; }
  .vtable td { padding: 5px 0; font-size: 12px; text-align: right; border-bottom: 1px solid var(--border); }
  .vtable tr:last-child td { border-bottom: 0; }
  .vtable td.ven { text-align: left; color: var(--text); font-weight: 600; }
  .noflow { padding: 18px 16px; color: var(--faint); font-size: 12px; }
  .noflow b { color: var(--muted); }

  @media (max-width: 760px) {
    .strip .stat:nth-child(n+3) { display: none; }
    .tagline { display: none; }
    input[type=text] { width: 140px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="pulse"></span><b>HL<span>·</span>TERMINAL</b></div>
  <div class="tabs">
    <button class="tab active" data-tab="flow">TWAP Flow</button>
    <button class="tab" data-tab="markets">Markets</button>
  </div>
  <div class="strip" id="strip"></div>
  <div class="topbar-right">
    <span class="updated" id="updated"></span>
    <label class="auto" title="Auto-refresh 30s"><input type="checkbox" id="autoRefresh" /><span class="switch"></span>Auto</label>
    <button class="rf" id="refresh"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh</button>
  </div>
</div>

<div class="toolbar" id="toolbar"></div>
<div id="content"></div>
<div class="foot" id="foot"></div>

<div class="backdrop" id="backdrop"></div>
<div class="modal" id="modal"></div>

<script>
const HS = 'https://api.hypurrscan.io/twap/*';
const HL = 'https://api.hyperliquid.xyz/info';
const post = (body) => fetch(HL, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) }).then(r=>r.json());
const REFRESH_MS = 30000;

let STATE = {
  tab: 'flow',
  // flow
  orders: [], rows: [], unit: 'usd', sortKey: 'netUsd', sortDir: -1, search: '', status: 'all',
  windowH: 'all', activeOnly: false, inclErrored: false, statuses: ['all'], selected: null,
  // markets
  perpMkts: [], spotMkts: [], mktKind: 'perp', mktSort: 'oiUsd', mktDir: -1, mktSearch: '',
  // meta
  generatedAt: '', generatedMs: 0, span: '', auto: false,
};
let autoTimer = null, autoNextMs = 0;

async function loadAll() {
  const [twaps, perpMC, spotMC, perpDexs, mids, predFund] = await Promise.all([
    fetch(HS).then(r=>r.json()),
    post({ type:'metaAndAssetCtxs' }),
    post({ type:'spotMetaAndAssetCtxs' }),
    post({ type:'perpDexs' }),
    post({ type:'allMids' }),
    post({ type:'predictedFundings' }).catch(()=>[]),
  ]);
  STATE.predFunding = {}; (predFund||[]).forEach(([coin,venues])=>{ STATE.predFunding[coin]=venues; });
  const perpMeta = perpMC[0], perpCtxs = perpMC[1];
  const spotMeta = spotMC[0], spotCtxs = spotMC[1];

  // builder-dex metas + mids (skip index 0 = main dex)
  const dexList = perpDexs.map((d,i)=>({i, name: d && d.name})).filter(d=>d.name);
  const dexData = await Promise.all(dexList.map(async d => ({
    ...d, meta: await post({ type:'meta', dex: d.name }), mids: await post({ type:'allMids', dex: d.name }),
  })));

  // ---- resolvers + perp ctx by name (for funding in flow table) ----
  const perpName = {}, perpCtxByName = {};
  perpMeta.universe.forEach((u,i)=>{ perpName[i]=u.name; perpCtxByName[u.name]=perpCtxs[i]; });
  const tokName = {}; spotMeta.tokens.forEach(t=> tokName[t.index]=t.name);
  const spotName = {}, spotMid = {};
  spotMeta.universe.forEach(u => {
    spotName[10000+u.index] = tokName[u.tokens[0]] || u.name;
    spotMid[10000+u.index]  = mids['@'+u.index];
  });
  const dexName = {}, dexMid = {};
  dexData.forEach(d => d.meta.universe.forEach((u,ai) => {
    const aid = 100000 + d.i*10000 + ai;
    dexName[aid] = d.name + ':' + u.name.split(':').pop();
    dexMid[aid]  = d.mids[u.name];
  }));
  const resolve = (a) => {
    if (a >= 100000) return { name: dexName[a] || ('dex#'+a), price: dexMid[a], kind:'builder' };
    if (a >= 10000)  return { name: spotName[a] || ('spot#'+(a-10000)), price: spotMid[a], kind:'spot' };
    return { name: perpName[a] || ('perp#'+a), price: mids[perpName[a]], kind:'perp' };
  };

  // ---- twap orders ----
  const statuses = new Set();
  STATE.orders = twaps.map(t => {
    const tw = t.action.twap; const r = resolve(tw.a);
    statuses.add(t.ended || 'active');
    const fc = r.kind==='perp' ? perpCtxByName[r.name] : null;
    return { name:r.name, kind:r.kind, price: r.price!=null?parseFloat(r.price):null,
             funding: fc && fc.funding!=null ? parseFloat(fc.funding) : null,
             buy: tw.b, size: parseFloat(tw.s), ended: t.ended || 'active',
             time: t.time, durMs: tw.m*60000, endTime: t.time + tw.m*60000 };
  });
  STATE.statuses = ['all', ...[...statuses].sort()];
  STATE.fundingByName = {}; for (const n in perpCtxByName){ const c=perpCtxByName[n]; STATE.fundingByName[n]= c&&c.funding!=null?parseFloat(c.funding):null; }
  const times = STATE.orders.map(o=>o.time);
  const lo = Math.min(...times), hi = Math.max(...times);
  const f = ms => new Date(ms).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  STATE.span = `${f(lo)} → ${f(hi)} (${((hi-lo)/3.6e6).toFixed(1)}h feed)`;

  // ---- perp markets ----
  STATE.perpMkts = perpMeta.universe.map((u,i)=>{
    const c = perpCtxs[i] || {};
    const mark = c.markPx!=null?parseFloat(c.markPx):null;
    const prev = c.prevDayPx!=null?parseFloat(c.prevDayPx):null;
    const oi = c.openInterest!=null?parseFloat(c.openInterest):null;
    const fund = c.funding!=null?parseFloat(c.funding):null;
    return { name:u.name, mark, prev,
      chg: (mark!=null&&prev)?(mark/prev-1):null,
      oiUsd: (oi!=null&&mark!=null)?oi*mark:null,
      vol: c.dayNtlVlm!=null?parseFloat(c.dayNtlVlm):null,
      fund, fundApr: fund!=null?fund*24*365:null,
      lev: u.maxLeverage };
  });
  // ---- spot markets ---- (align ctx by coin name, fallback index)
  const ctxByCoin = {}; spotCtxs.forEach((c,i)=>{ if(c&&c.coin) ctxByCoin[c.coin]=c; });
  STATE.spotMkts = spotMeta.universe.map((u,i)=>{
    const c = ctxByCoin[u.name] || spotCtxs[i] || {};
    const mark = c.markPx!=null?parseFloat(c.markPx):null;
    const prev = c.prevDayPx!=null?parseFloat(c.prevDayPx):null;
    const supply = c.circulatingSupply!=null?parseFloat(c.circulatingSupply):null;
    return { name: tokName[u.tokens[0]] || u.name, pair:u.name, mark, prev,
      chg:(mark!=null&&prev)?(mark/prev-1):null,
      vol: c.dayNtlVlm!=null?parseFloat(c.dayNtlVlm):null,
      mcap:(supply!=null&&mark!=null)?supply*mark:null };
  }).filter(m=> m.vol);
  // dedupe by base token, keep the highest-volume quote pair
  const bestByTok = new Map();
  for (const m of STATE.spotMkts) { const e=bestByTok.get(m.name); if(!e || (m.vol||0)>(e.vol||0)) bestByTok.set(m.name,m); }
  STATE.spotMkts = [...bestByTok.values()];
  // name → market lookups for the detail modal
  STATE.perpByName = {}; STATE.perpMkts.forEach(m=> STATE.perpByName[m.name]=m);
  STATE.spotByName = {}; STATE.spotMkts.forEach(m=> STATE.spotByName[m.name]=m);

  STATE.generatedMs = Date.now(); STATE.generatedAt = new Date().toLocaleString();
  aggregate();
}

function aggregate() {
  const now = Date.now();
  const winMs = STATE.windowH==='all' ? Infinity : STATE.windowH*3.6e6;
  const m = new Map(); let kept=0, live=0;
  for (const o of STATE.orders) {
    if (STATE.status!=='all' && o.ended!==STATE.status) continue;
    if (STATE.status==='all' && !STATE.inclErrored && o.ended==='error') continue;  // errored TWAPs often barely filled; exclude from flow by default
    if (now - o.time > winMs) continue;
    const isLive = o.ended==='active' && now<=o.endTime;
    if (STATE.activeOnly && !isLive) continue;
    kept++; if (isLive) live++;
    let g = m.get(o.name);
    if (!g) { g={ name:o.name, kind:o.kind, price:o.price, funding:o.funding, n:0,nb:0,ns:0,bSz:0,sSz:0,live:0 }; m.set(o.name,g); }
    g.n++; if (isLive) g.live++;
    if (o.buy){ g.nb++; g.bSz+=o.size; } else { g.ns++; g.sSz+=o.size; }
  }
  STATE.kept=kept; STATE.live=live;
  STATE.rows = [...m.values()].map(g=>{
    const netSz=g.bSz-g.sSz, p=g.price;
    return { ...g, netSz, bUsd:p!=null?g.bSz*p:null, sUsd:p!=null?g.sSz*p:null, netUsd:p!=null?netSz*p:null };
  });
  render();
}

// ===== formatters =====
function fmt(n,dp=0){ return n==null?'—':n.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function fmtUsd(n){ if(n==null)return'—'; const s=n<0?'-':'+',a=Math.abs(n);
  if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B'; if(a>=1e6)return s+'$'+(a/1e6).toFixed(2)+'M';
  if(a>=1e3)return s+'$'+(a/1e3).toFixed(1)+'K'; return s+'$'+a.toFixed(0); }
function fmtUsdA(n){ if(n==null)return'—'; const a=Math.abs(n);
  if(a>=1e9)return'$'+(a/1e9).toFixed(2)+'B'; if(a>=1e6)return'$'+(a/1e6).toFixed(2)+'M';
  if(a>=1e3)return'$'+(a/1e3).toFixed(1)+'K'; return '$'+a.toFixed(0); }
function fmtPx(p){ if(p==null)return'—'; if(p>=1000)return'$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  return '$'+p.toLocaleString('en-US',{maximumFractionDigits:p<1?6:2}); }
function fmtPct(x,dp=2){ if(x==null)return'—'; return (x>=0?'+':'')+(x*100).toFixed(dp)+'%'; }

// ===== render dispatch =====
function render(){
  renderStrip();
  renderToolbar();
  if (STATE.tab==='flow') renderFlow(); else renderMarkets();
  updateClock();
}

function renderStrip(){
  const totUsd = STATE.rows.reduce((s,r)=>s+(r.netUsd||0),0);
  const perpOI = STATE.perpMkts.reduce((s,m)=>s+(m.oiUsd||0),0);
  const perpVol = STATE.perpMkts.reduce((s,m)=>s+(m.vol||0),0);
  const spotVol = STATE.spotMkts.reduce((s,m)=>s+(m.vol||0),0);
  const stat=(k,v)=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
  document.getElementById('strip').innerHTML =
    stat('TWAP orders', `${fmt(STATE.kept||0)} <span class="livedot">·${fmt(STATE.live||0)}</span>`) +
    stat('Net flow', `<span class="${totUsd>=0?'buy':'sell'}">${fmtUsd(totUsd)}</span>`) +
    stat('Perp OI', fmtUsdA(perpOI)) +
    stat('24h perp vol', fmtUsdA(perpVol)) +
    stat('24h spot vol', fmtUsdA(spotVol));
}

function renderToolbar(){
  const tb = document.getElementById('toolbar');
  const searchBox = (id,val,ph)=>`<div class="search-box"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="${id}" placeholder="${ph}" value="${val.replace(/"/g,'&quot;')}" /></div>`;
  if (STATE.tab==='flow'){
    tb.innerHTML =
      searchBox('search', STATE.search, 'Filter token…') +
      `<div class="sep"></div><span class="ctl-label">Unit</span>
       <div class="seg" id="unitSeg"><button data-unit="usd" class="${STATE.unit==='usd'?'active':''}">USD</button><button data-unit="base" class="${STATE.unit==='base'?'active':''}">Base</button></div>
       <span class="ctl-label">Window</span>
       <div class="seg" id="windowSeg">${['1','6','24','all'].map(w=>`<button data-win="${w}" class="${String(STATE.windowH)===w?'active':''}">${w==='all'?'All':w+'h'}</button>`).join('')}</div>
       <select id="statusFilter">${STATE.statuses.map(s=>`<option value="${s}" ${STATE.status===s?'selected':''}>${s==='all'?'All statuses':s}</option>`).join('')}</select>
       <label class="chk"><input type="checkbox" id="activeOnly" ${STATE.activeOnly?'checked':''}/> Active now</label>
       <label class="chk" title="Errored TWAPs terminated early and often barely filled"><input type="checkbox" id="inclErrored" ${STATE.inclErrored?'checked':''}/> Include errored</label>
       <div class="spacer"></div><span class="rowcount" id="rowcount"></span>`;
    document.getElementById('search').oninput = e=>{ STATE.search=e.target.value; renderFlow(); };
    document.getElementById('unitSeg').onclick = e=>{ if(!e.target.dataset.unit)return; STATE.unit=e.target.dataset.unit; STATE.sortKey=STATE.unit==='usd'?'netUsd':'netSz'; renderToolbar(); renderFlow(); };
    document.getElementById('windowSeg').onclick = e=>{ if(!e.target.dataset.win)return; STATE.windowH=e.target.dataset.win==='all'?'all':+e.target.dataset.win; aggregate(); };
    document.getElementById('statusFilter').onchange = e=>{ STATE.status=e.target.value; aggregate(); };
    document.getElementById('activeOnly').onchange = e=>{ STATE.activeOnly=e.target.checked; aggregate(); };
    document.getElementById('inclErrored').onchange = e=>{ STATE.inclErrored=e.target.checked; aggregate(); };
  } else {
    tb.innerHTML =
      searchBox('mktSearch', STATE.mktSearch, 'Filter market…') +
      `<div class="sep"></div>
       <div class="seg" id="mktKindSeg"><button data-k="perp" class="${STATE.mktKind==='perp'?'active':''}">Perps</button><button data-k="spot" class="${STATE.mktKind==='spot'?'active':''}">Spot</button></div>
       <div class="spacer"></div><span class="rowcount" id="rowcount"></span>`;
    document.getElementById('mktSearch').oninput = e=>{ STATE.mktSearch=e.target.value; renderMarkets(); };
    document.getElementById('mktKindSeg').onclick = e=>{ if(!e.target.dataset.k)return; STATE.mktKind=e.target.dataset.k;
      STATE.mktSort = STATE.mktKind==='perp'?'oiUsd':'vol'; STATE.mktDir=-1; renderToolbar(); renderMarkets(); };
  }
}

// ===== FLOW tab =====
function renderFlow(){
  const usd = STATE.unit==='usd';
  let rows = STATE.rows.filter(r=> r.name.toLowerCase().includes(STATE.search.toLowerCase()));
  const key=STATE.sortKey, dir=STATE.sortDir;
  rows.sort((a,b)=>{ let av=a[key],bv=b[key];
    if(key==='netUsd'||key==='netSz'){ av=Math.abs(av??-Infinity); bv=Math.abs(bv??-Infinity); }
    if(typeof av==='string') return av.localeCompare(bv)*dir;
    return ((av??-Infinity)-(bv??-Infinity))*dir; });
  const maxAbs = Math.max(...rows.map(r=>Math.abs((usd?r.netUsd:r.netSz)||0)),1);

  const col=(k,l)=>`<th class="mono" data-key="${k}">${l}${STATE.sortKey===k?` <span class="ar">${dir<0?'▼':'▲'}</span>`:''}</th>`;
  const head=`<tr>${col('name','Token').replace('mono','')}${col('n','Ord')}${col('live','Live')}<th class="nosort">B/S</th>${col('funding','Fund 1h')}${col('price','Price')}${usd?col('bUsd','Buy $'):col('bSz','Buy')}${usd?col('sUsd','Sell $'):col('sSz','Sell')}${usd?col('netUsd','Net $'):col('netSz','Net')}</tr>`;

  let body;
  if (rows.length===0){
    body = `<tr><td colspan="9"><div class="empty"><div class="big">No TWAP orders match</div>Widen the window or clear filters.</div></td></tr>`;
  } else {
    body = rows.map(r=>{
      const net=usd?r.netUsd:r.netSz, cls=net>0?'buy':net<0?'sell':'';
      const w=Math.round(Math.abs(net||0)/maxAbs*46);
      const bar=`<span class="nb" style="width:${w}px;background:${net>=0?'var(--buy)':'var(--sell)'}"></span>`;
      const kb=r.kind!=='perp'?`<span class="badge">${r.kind}</span>`:'';
      const fund=r.funding!=null?`<span class="${r.funding>=0?'up':'down'}">${fmtPct(r.funding,4)}</span>`:'<span class="dim">—</span>';
      return `<tr class="clk" data-token="${r.name.replace(/"/g,'&quot;')}" data-kind="${r.kind}">
        <td class="tok">${r.name}${kb}</td>
        <td class="mono">${r.n}</td>
        <td class="mono ${r.live?'livedot':'dim'}">${r.live?'●'+r.live:'—'}</td>
        <td class="mono"><span class="buy">${r.nb}</span><span class="dim">/</span><span class="sell">${r.ns}</span></td>
        <td class="mono">${fund}</td>
        <td class="mono dim">${fmtPx(r.price)}</td>
        <td class="mono buy">${usd?(r.bUsd!=null?fmtUsdA(r.bUsd):'—'):fmt(r.bSz,1)}</td>
        <td class="mono sell">${usd?(r.sUsd!=null?fmtUsdA(r.sUsd):'—'):fmt(r.sSz,1)}</td>
        <td class="mono ${cls}"><span class="netcell">${usd?fmtUsd(net):(net>=0?'+':'')+fmt(net,1)}${bar}</span></td>
      </tr>`;
    }).join('');
  }
  document.getElementById('content').innerHTML = `<div class="tablewrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  const rc=document.getElementById('rowcount'); if(rc) rc.textContent = `${rows.length} tokens · ${STATE.kept} orders`;
  wireSort('flow');
  document.querySelectorAll('tbody tr[data-token]').forEach(tr=> tr.onclick=()=>openToken(tr.dataset.token, tr.dataset.kind));
  renderFoot('flow');
}

// ===== MARKETS tab =====
function renderMarkets(){
  const perp = STATE.mktKind==='perp';
  const src = perp ? STATE.perpMkts : STATE.spotMkts;
  let rows = src.filter(m=> m.name.toLowerCase().includes(STATE.mktSearch.toLowerCase()));
  const key=STATE.mktSort, dir=STATE.mktDir;
  rows.sort((a,b)=>{ let av=a[key],bv=b[key];
    if(typeof av==='string') return av.localeCompare(bv)*dir;
    return ((av??-Infinity)-(bv??-Infinity))*dir; });

  const col=(k,l)=>`<th class="mono" data-key="${k}">${l}${STATE.mktSort===k?` <span class="ar">${dir<0?'▼':'▲'}</span>`:''}</th>`;
  let head, body;
  if (perp){
    const maxOi=Math.max(...rows.map(m=>m.oiUsd||0),1), maxVol=Math.max(...rows.map(m=>m.vol||0),1);
    head=`<tr><th data-key="name">Market</th>${col('mark','Mark')}${col('chg','24h %')}${col('oiUsd','Open Interest')}${col('vol','24h Volume')}${col('fund','Fund 1h')}${col('fundApr','Fund APR')}</tr>`;
    body=rows.map(m=>{
      const chg=m.chg, ow=Math.round((m.oiUsd||0)/maxOi*90), vw=Math.round((m.vol||0)/maxVol*90);
      return `<tr class="clk" data-token="${m.name.replace(/"/g,'&quot;')}" data-kind="perp">
        <td class="tok">${m.name}<span class="dim" style="font-weight:400;margin-left:6px">${m.lev}×</span></td>
        <td class="mono">${fmtPx(m.mark)}</td>
        <td class="mono ${chg==null?'dim':chg>=0?'up':'down'}">${fmtPct(chg)}</td>
        <td class="mono cellbar"><span class="fill" style="width:${ow}%"></span><span>${fmtUsdA(m.oiUsd)}</span></td>
        <td class="mono cellbar"><span class="fill" style="width:${vw}%"></span><span>${fmtUsdA(m.vol)}</span></td>
        <td class="mono ${m.fund==null?'dim':m.fund>=0?'up':'down'}">${fmtPct(m.fund,4)}</td>
        <td class="mono ${m.fundApr==null?'dim':m.fundApr>=0?'up':'down'}">${fmtPct(m.fundApr,1)}</td>
      </tr>`;
    }).join('');
  } else {
    const maxVol=Math.max(...rows.map(m=>m.vol||0),1), maxMc=Math.max(...rows.map(m=>m.mcap||0),1);
    head=`<tr><th data-key="name">Token</th>${col('mark','Price')}${col('chg','24h %')}${col('vol','24h Volume')}${col('mcap','Market Cap')}</tr>`;
    body=rows.map(m=>{
      const chg=m.chg, vw=Math.round((m.vol||0)/maxVol*90), mw=Math.round((m.mcap||0)/maxMc*90);
      return `<tr class="clk" data-token="${m.name.replace(/"/g,'&quot;')}" data-kind="spot">
        <td class="tok">${m.name}</td>
        <td class="mono">${fmtPx(m.mark)}</td>
        <td class="mono ${chg==null?'dim':chg>=0?'up':'down'}">${fmtPct(chg)}</td>
        <td class="mono cellbar"><span class="fill" style="width:${vw}%"></span><span>${fmtUsdA(m.vol)}</span></td>
        <td class="mono cellbar"><span class="fill" style="width:${mw}%"></span><span>${fmtUsdA(m.mcap)}</span></td>
      </tr>`;
    }).join('');
  }
  if (rows.length===0) body=`<tr><td colspan="7"><div class="empty"><div class="big">No markets match</div></div></td></tr>`;
  document.getElementById('content').innerHTML = `<div class="tablewrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  const rc=document.getElementById('rowcount'); if(rc) rc.textContent = `${rows.length} ${perp?'perps':'spot pairs'}`;
  wireSort('markets');
  document.querySelectorAll('tbody tr[data-token]').forEach(tr=> tr.onclick=()=>openToken(tr.dataset.token, tr.dataset.kind));
  renderFoot('markets');
}

function wireSort(tab){
  document.querySelectorAll('thead th[data-key]').forEach(th=>{
    th.onclick=()=>{ const k=th.dataset.key;
      if (tab==='flow'){ if(STATE.sortKey===k) STATE.sortDir*=-1; else {STATE.sortKey=k; STATE.sortDir=(k==='name'?1:-1);} renderFlow(); }
      else { if(STATE.mktSort===k) STATE.mktDir*=-1; else {STATE.mktSort=k; STATE.mktDir=(k==='name'?1:-1);} renderMarkets(); }
    };
  });
}

function renderFoot(tab){
  const el=document.getElementById('foot');
  if (tab==='flow'){
    const nErr = STATE.orders.filter(o=>o.ended==='error').length;
    const errNote = nErr ? (STATE.inclErrored
      ? ` · <span class="down">including ${nErr} errored</span> (terminated early — stated size likely overstates fills)`
      : ` · ${nErr} errored TWAPs hidden (terminated early; toggle “Include errored” to add them)`) : '';
    el.innerHTML = `Feed: ${STATE.span} · window ${STATE.windowH==='all'?'all':'last '+STATE.windowH+'h'}${STATE.activeOnly?' · active-now only':''}${errNote} · <span class="livedot">●</span> live = TWAP executing now · Fund 1h = perp funding rate · prices are current marks (notional).<br>data: <a href="https://hypurrscan.io" target="_blank" rel="noopener">hypurrscan</a> + <a href="https://hyperliquid.xyz" target="_blank" rel="noopener">Hyperliquid</a> · generated ${STATE.generatedAt}`;
  } else {
    el.innerHTML = `OI = open interest (notional) · Fund 1h = current hourly funding · Fund APR = annualized · 24h volume & change from Hyperliquid asset contexts. Spot market cap = circulating supply × price.<br>data: <a href="https://hyperliquid.xyz" target="_blank" rel="noopener">Hyperliquid</a> · generated ${STATE.generatedAt}`;
  }
}

function updateClock(){
  if(!STATE.generatedMs) return;
  const sec=Math.round((Date.now()-STATE.generatedMs)/1000);
  const ago = sec<5?'just now':sec<60?sec+'s ago':Math.floor(sec/60)+'m '+(sec%60)+'s ago';
  let auto=''; if(STATE.auto&&autoNextMs){ auto=` · next ${Math.max(0,Math.round((autoNextMs-Date.now())/1000))}s`; }
  document.getElementById('updated').innerHTML = `updated <b>${ago}</b>${auto}`;
}

// ===== token detail modal =====
function fmtDur(ms){ const m=Math.round(ms/60000); if(m<60)return m+'m'; const h=Math.floor(m/60),mm=m%60; return mm?`${h}h ${mm}m`:`${h}h`; }
function relTime(ms){ const m=Math.round((Date.now()-ms)/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; const h=Math.floor(m/60); if(h<24)return h+'h '+(m%60)+'m ago'; return Math.floor(h/24)+'d ago'; }
const candleCache = {};
async function getCandles(coin){
  if(candleCache[coin]!==undefined) return candleCache[coin];
  const now=Date.now();
  try { const d=await post({type:'candleSnapshot', req:{coin, interval:'1h', startTime:now-24*3.6e6, endTime:now}}); candleCache[coin]=Array.isArray(d)?d:[]; }
  catch(e){ candleCache[coin]=[]; }
  return candleCache[coin];
}
function sparkSvg(candles){
  if(!candles || candles.length<2) return null;
  const cl=candles.map(c=>parseFloat(c.c));
  const min=Math.min(...cl), max=Math.max(...cl), rng=(max-min)||1;
  const W=600,H=96,p=6;
  const pts=cl.map((v,i)=>`${(p+i/(cl.length-1)*(W-2*p)).toFixed(1)},${(p+(1-(v-min)/rng)*(H-2*p)).toFixed(1)}`);
  const up=cl[cl.length-1]>=cl[0];
  return { hi:max, lo:min, up, svg:`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="spark"><polygon points="${p},${H-p} ${pts.join(' ')} ${W-p},${H-p}" fill="${up?'var(--buy-dim)':'var(--sell-dim)'}"/><polyline points="${pts.join(' ')}" fill="none" stroke="${up?'var(--buy)':'var(--sell)'}" stroke-width="1.6" vector-effect="non-scaling-stroke"/></svg>` };
}
const VENUE={HlPerp:'Hyperliquid',BinPerp:'Binance',BybitPerp:'Bybit'};
function crossVenue(coin){
  const v=STATE.predFunding && STATE.predFunding[coin];
  if(!v || !v.length) return '';
  const rows=v.map(([name,info])=>{ if(!info) return '';
    const r=parseFloat(info.fundingRate), hrs=info.fundingIntervalHours||1, apr=r*(24/hrs)*365;
    return `<tr><td class="ven">${VENUE[name]||name}</td><td class="mono ${r>=0?'up':'down'}">${fmtPct(r,4)}<span class="dim"> /${hrs}h</span></td><td class="mono ${apr>=0?'up':'down'}">${fmtPct(apr,1)} <span class="dim">APR</span></td></tr>`;
  }).join('');
  return `<div class="msec"><div class="mseclbl">Cross-venue funding</div><table class="vtable"><tbody>${rows}</tbody></table></div>`;
}
function openToken(name, kind){
  STATE.selected=name; STATE.selKind=kind||null;
  document.getElementById('backdrop').classList.add('open'); document.getElementById('modal').classList.add('open');
  document.getElementById('modal').scrollTop=0;
  const coin = kind==='spot' ? (STATE.spotByName[name]&&STATE.spotByName[name].pair) : (kind==='perp'?name:null);
  renderDetail();
  if(coin) getCandles(coin).then(()=>{ if(STATE.selected===name) renderDetail(); });
}
function closeModal(){ STATE.selected=null; document.getElementById('backdrop').classList.remove('open'); document.getElementById('modal').classList.remove('open'); }
function renderDetail(){
  if(!STATE.selected) return;
  const name=STATE.selected, kind=STATE.selKind, now=Date.now();
  const pm=STATE.perpByName[name], sm=STATE.spotByName[name];
  const orders=STATE.orders.filter(o=>o.name===name).sort((a,b)=>b.time-a.time);
  const live=orders.filter(o=>o.ended==='active'&&now<=o.endTime);
  const px = pm?pm.mark : sm?sm.mark : (orders[0]?orders[0].price:null);
  const netSz=orders.reduce((s,o)=>s+(o.buy?o.size:-o.size),0);
  const netUsd=px!=null?netSz*px:null;
  const badge = kind&&kind!=='perp'?`<span class="badge">${kind}</span>`:'';
  const item=(k,v)=>`<div class="i"><div class="k">${k}</div><b>${v}</b></div>`;

  let stats='';
  if(pm){
    stats = item('Mark',fmtPx(pm.mark))+item('24h',`<span class="${pm.chg>=0?'up':'down'}">${fmtPct(pm.chg)}</span>`)
      +item('Open interest',fmtUsdA(pm.oiUsd))+item('24h volume',fmtUsdA(pm.vol))
      +item('Funding 1h',`<span class="${pm.fund>=0?'up':'down'}">${fmtPct(pm.fund,4)}</span>`)
      +item('Funding APR',`<span class="${pm.fundApr>=0?'up':'down'}">${fmtPct(pm.fundApr,1)}</span>`)
      +item('Max lev',pm.lev+'×');
  } else if(sm){
    stats = item('Price',fmtPx(sm.mark))+item('24h',`<span class="${sm.chg>=0?'up':'down'}">${fmtPct(sm.chg)}</span>`)
      +item('24h volume',fmtUsdA(sm.vol))+item('Market cap',fmtUsdA(sm.mcap));
  } else { stats = item('Mark',fmtPx(px)); }
  if(orders.length){ stats += item('TWAP orders',orders.length)+item('Live now',`<span class="livedot">${live.length}</span>`)
      +item('TWAP net',`<span class="${netUsd>=0?'buy':'sell'}">${netUsd!=null?fmtUsd(netUsd):(netSz>=0?'+':'')+fmt(netSz,1)}</span>`); }

  const head=`<div class="mhead"><h2>${name}</h2>${badge}<button class="x" onclick="closeModal()">×</button></div><div class="msum">${stats}</div>`;

  const coin = kind==='spot' ? (sm&&sm.pair) : (kind==='perp'?name:null);
  let chart='';
  if(coin){
    const c=candleCache[coin];
    if(c===undefined) chart=`<div class="msec"><div class="mseclbl">24h price</div><div class="chartbox load"><span class="spin"></span></div></div>`;
    else { const s=sparkSvg(c);
      chart = s ? `<div class="msec"><div class="mseclbl">24h price <span class="dim">· ${fmtPx(s.lo)} – ${fmtPx(s.hi)} · <span class="${s.up?'up':'down'}">${fmtPct(c.length?parseFloat(c[c.length-1].c)/parseFloat(c[0].o)-1:0)}</span></span></div><div class="chartbox">${s.svg}</div></div>`
                : `<div class="msec"><div class="mseclbl">24h price</div><div class="chartbox empty2">no candle data</div></div>`; }
  }
  const cv = kind==='perp' ? crossVenue(name) : '';

  let ordersHtml;
  if(orders.length){
    ordersHtml = `<div class="mseclbl pad">TWAP orders · ${orders.length}</div>` + orders.map(o=>{
      const dur=o.endTime-o.time, isLive=o.ended==='active'&&now<=o.endTime;
      const prog=Math.max(0,Math.min(1,(now-o.time)/dur)), usd=o.price!=null?o.size*o.price:null;
      let rem,bc;
      if(isLive){ rem=`<span class="rem">${fmtDur(o.endTime-now)} left</span>`; bc=o.buy?'var(--buy)':'var(--sell)'; }
      else if(o.ended==='active'){ rem='finishing…'; bc='var(--muted)'; }
      else { rem=o.ended==='canceled'?'canceled':'ended (error)'; bc='var(--border2)'; }
      const pct=o.ended==='active'?prog:1;
      return `<div class="order"><div class="otop">
          <span class="side ${o.buy?'b':'s'}">${o.buy?'BUY':'SELL'}</span>
          <span class="sz">${fmt(o.size,o.size<10?2:1)}${usd!=null?` · $${fmt(usd)}`:''}</span>
          <span class="st ${o.ended}">${o.ended}</span>
          <span class="ago">${relTime(o.time)} · ${fmtDur(dur)} TWAP</span>
        </div><div class="prog"><div class="pbar"><div class="pfill" style="width:${(pct*100).toFixed(1)}%;background:${bc}"></div></div>
          <div class="pmeta"><span>${(pct*100).toFixed(0)}% elapsed</span>${rem}</div></div></div>`;
    }).join('');
  } else { ordersHtml = `<div class="noflow">No TWAP orders for <b>${name}</b> in the current feed.</div>`; }

  document.getElementById('modal').innerHTML = head + chart + cv + ordersHtml;
}
setInterval(()=>{ if(STATE.selected) renderDetail(); updateClock(); }, 1000);

// ===== skeleton =====
function showSkeleton(){
  document.getElementById('content').innerHTML = `<div class="loadline"><span class="spin"></span> Fetching markets, TWAPs &amp; funding…</div>${'<div class="skelrow"></div>'.repeat(12)}`;
}

// ===== wiring =====
document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{
  STATE.tab=t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  render();
});
document.getElementById('backdrop').onclick=closeModal;
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='/' && document.activeElement.tagName!=='INPUT'){ e.preventDefault(); const s=document.querySelector('#search,#mktSearch'); if(s)s.focus(); }
});

function setupAuto(){ if(autoTimer)clearInterval(autoTimer); autoNextMs=0;
  if(STATE.auto){ autoNextMs=Date.now()+REFRESH_MS; autoTimer=setInterval(()=>{ autoNextMs=Date.now()+REFRESH_MS; refresh(); },REFRESH_MS); } }
document.getElementById('autoRefresh').onchange=e=>{ STATE.auto=e.target.checked; setupAuto(); updateClock(); };

async function refresh(){
  const btn=document.getElementById('refresh'); btn.disabled=true; btn.classList.add('spinning');
  if(!STATE.orders.length && !STATE.perpMkts.length) showSkeleton();
  try { await loadAll(); }
  catch(err){ document.getElementById('content').innerHTML=`<div class="err">Failed to load: ${err.message}.<br>Public APIs may be rate-limiting.<br><button class="rf" onclick="refresh()">Try again</button></div>`; }
  finally { btn.disabled=false; btn.classList.remove('spinning'); if(STATE.auto) autoNextMs=Date.now()+REFRESH_MS; }
}
document.getElementById('refresh').onclick=refresh;
refresh();
</script>
</body>
</html>
