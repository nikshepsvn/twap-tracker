<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hyperliquid TWAP Flow</title>
<meta name="description" content="Live Hyperliquid TWAP order flow, aggregated by token — net buying/selling pressure in real time." />
<style>
  :root {
    --bg: #070a10; --bg2: #0b0e14;
    --panel: #11151f; --panel2: #171c28; --panel3: #1d2433;
    --border: #222a3a; --border2: #2c364a;
    --text: #e8ebf2; --muted: #8a93a8; --faint: #5a6276;
    --buy: #2ebd96; --buy-dim: rgba(46,189,150,.14);
    --sell: #f0616d; --sell-dim: rgba(240,97,109,.14);
    --accent: #7c8cff; --accent2: #5d6df0;
    --shadow: rgba(0,0,0,.5);
    --grid-line: rgba(255,255,255,.04);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124,140,255,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(46,189,150,.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "SF Mono", "JetBrains Mono", "Roboto Mono", ui-monospace, Menlo, Consolas, monospace; }
  ::selection { background: rgba(124,140,255,.3); }

  /* ---------- header ---------- */
  header {
    position: sticky; top: 0; z-index: 30;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: rgba(7,10,16,.78); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .pulse {
    width: 9px; height: 9px; border-radius: 50%; background: var(--buy);
    box-shadow: 0 0 0 0 rgba(46,189,150,.6); animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(46,189,150,.55); }
    70% { box-shadow: 0 0 0 8px rgba(46,189,150,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,189,150,0); }
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 650; letter-spacing: .2px; }
  header h1 .accent { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 12px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .updated { color: var(--faint); font-size: 12px; display: flex; align-items: center; gap: 7px; }
  .updated b { color: var(--muted); font-weight: 500; }
  .autorefresh { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; cursor: pointer; user-select: none; }
  .switch { position: relative; width: 32px; height: 18px; border-radius: 10px; background: var(--panel3); border: 1px solid var(--border2); transition: background .2s; }
  .switch::after { content:''; position:absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--muted); transition: transform .2s, background .2s; }
  .autorefresh input { display: none; }
  .autorefresh input:checked + .switch { background: var(--buy-dim); border-color: rgba(46,189,150,.5); }
  .autorefresh input:checked + .switch::after { transform: translateX(14px); background: var(--buy); }
  button.refresh {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    border: 0; color: #fff; padding: 8px 15px; border-radius: 9px; cursor: pointer;
    font-size: 13px; font-weight: 550; box-shadow: 0 2px 10px rgba(93,109,240,.3);
    transition: transform .1s, box-shadow .2s, opacity .2s;
  }
  button.refresh:hover { box-shadow: 0 4px 16px rgba(93,109,240,.45); }
  button.refresh:active { transform: translateY(1px); }
  button.refresh:disabled { opacity: .55; cursor: default; box-shadow: none; }

  .wrap { padding: 22px 24px 60px; max-width: 1240px; margin: 0 auto; }

  /* ---------- KPI cards ---------- */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap: 12px; margin-bottom: 16px; }
  .card {
    position: relative; background: linear-gradient(180deg, var(--panel), var(--bg2));
    border: 1px solid var(--border); border-radius: 13px; padding: 15px 17px; overflow: hidden;
  }
  .card::before { content:''; position: absolute; inset: 0 auto auto 0; width: 3px; height: 100%; background: var(--accent); opacity: .55; }
  .card.buyaccent::before { background: var(--buy); }
  .card.sellaccent::before { background: var(--sell); }
  .card .label { color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .7px; font-weight: 600; }
  .card .val { font-size: 26px; font-weight: 650; margin-top: 6px; letter-spacing: -.4px; line-height: 1.1; }
  .card .val small { font-size: 13px; font-weight: 500; }
  .card .foot { color: var(--faint); font-size: 11px; margin-top: 7px; }
  /* gauge card */
  .gauge { margin-top: 10px; }
  .gauge-track { height: 9px; border-radius: 5px; background: var(--sell-dim); overflow: hidden; display: flex; }
  .gauge-buy { background: linear-gradient(90deg, rgba(46,189,150,.5), var(--buy)); height: 100%; transition: width .5s ease; }
  .gauge-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; }

  /* ---------- controls ---------- */
  .toolbar {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border); border-radius: 13px;
    padding: 11px 13px; margin-bottom: 16px;
  }
  .search-box { position: relative; flex: 1 1 220px; min-width: 180px; }
  .search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
  input[type=text] {
    width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px 9px 34px; border-radius: 9px; font-size: 13px; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(124,140,255,.12); }
  select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 11px; border-radius: 9px; font-size: 13px; outline: none; cursor: pointer;
  }
  select:focus { border-color: var(--accent2); }
  .ctl-label { color: var(--faint); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .seg { display: inline-flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; padding: 2px; gap: 2px; }
  .seg button {
    background: transparent; border: 0; color: var(--muted); padding: 6px 12px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; border-radius: 7px; transition: background .15s, color .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--panel3); color: #fff; box-shadow: 0 1px 3px var(--shadow); }
  .chk { display: inline-flex; align-items: center; gap: 7px; color: var(--text); font-size: 12.5px; cursor: pointer; user-select: none; }
  .chk input { accent-color: var(--buy); width: 14px; height: 14px; }
  .chk .hint { color: var(--faint); font-size: 11px; }
  .divider { width: 1px; height: 24px; background: var(--border); }

  /* ---------- flow chart ---------- */
  .flowchart { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; padding: 16px 18px; margin-bottom: 16px; }
  .flowchart-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .flowchart-head h3 { margin: 0; font-size: 13px; font-weight: 600; }
  .flowchart-head span { color: var(--faint); font-size: 11.5px; }
  .frow { display: grid; grid-template-columns: 96px 1fr 96px; align-items: center; gap: 10px; padding: 3px 0; cursor: pointer; }
  .frow:hover .ftok { color: var(--accent); }
  .ftok { font-size: 12.5px; font-weight: 600; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; }
  .ftrack { position: relative; height: 22px; }
  .ftrack .mid { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--border2); }
  .fbar { position: absolute; top: 3px; height: 16px; border-radius: 4px; }
  .fbar.b { left: 50%; background: linear-gradient(90deg, rgba(46,189,150,.55), var(--buy)); }
  .fbar.s { right: 50%; background: linear-gradient(270deg, rgba(240,97,109,.55), var(--sell)); }
  .fval { font-size: 12px; font-weight: 600; white-space: nowrap; }
  .fval.b { text-align: left; }
  .fval.s { text-align: right; }

  /* ---------- table ---------- */
  .table-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 11px 14px; text-align: right; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  thead th {
    background: var(--panel2); color: var(--muted); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .6px; font-weight: 600; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 2;
    border-bottom: 1px solid var(--border);
  }
  thead th:hover { color: var(--text); }
  thead th .arrow { color: var(--accent); font-size: 9px; }
  tbody tr { border-top: 1px solid var(--border); cursor: pointer; transition: background .1s; }
  tbody tr:hover { background: var(--panel2); }
  tbody tr:first-child { border-top: 0; }
  .tok { font-weight: 600; }
  td.tok { position: relative; }
  td.tok::after { content: '›'; color: var(--accent); margin-left: 8px; opacity: 0; transition: opacity .15s; font-weight: 700; }
  tbody tr:hover td.tok::after { opacity: .8; }
  .badge { display: inline-block; font-size: 9.5px; padding: 1px 6px; border-radius: 5px; margin-left: 7px; vertical-align: middle; border: 1px solid var(--border2); color: var(--faint); text-transform: uppercase; letter-spacing: .4px; }
  .buy { color: var(--buy); } .sell { color: var(--sell); }
  .num { font-variant-numeric: tabular-nums; font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; }
  .bs { font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .livedot { color: var(--buy); font-variant-numeric: tabular-nums; }
  .net-cell { display: inline-flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .netbar { display: inline-block; height: 6px; border-radius: 3px; }
  .empty { padding: 50px 20px; text-align: center; color: var(--muted); }
  .empty .big { font-size: 15px; color: var(--text); margin-bottom: 4px; }

  /* ---------- skeleton ---------- */
  .skel-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap: 12px; margin-bottom: 16px; }
  .skel { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; position: relative; overflow: hidden; }
  .skel.card-s { height: 92px; }
  .skel.row-s { height: 44px; border-radius: 0; border: 0; border-top: 1px solid var(--border); }
  .skel::after { content:''; position: absolute; inset: 0; transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.045), transparent); animation: shimmer 1.3s infinite; }
  @keyframes shimmer { 100% { transform: translateX(100%); } }
  .loading-line { display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 13px; padding: 4px 2px 14px; }

  /* ---------- meta footer ---------- */
  .metafoot { color: var(--faint); font-size: 11.5px; margin-top: 16px; line-height: 1.7; }
  .metafoot code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; color: var(--muted); }
  .metafoot a { color: var(--accent); text-decoration: none; }
  .metafoot a:hover { text-decoration: underline; }

  /* ---------- modal ---------- */
  .backdrop { position: fixed; inset: 0; background: rgba(4,6,10,.7); backdrop-filter: blur(3px); display: none; z-index: 50; opacity: 0; transition: opacity .2s; }
  .backdrop.open { display: block; opacity: 1; }
  .modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-48%);
    width: min(780px, 94vw); max-height: 88vh; overflow-y: auto; z-index: 51;
    background: var(--panel); border: 1px solid var(--border2); border-radius: 16px;
    box-shadow: 0 24px 70px var(--shadow); display: none; opacity: 0; transition: opacity .2s, transform .2s;
  }
  .modal.open { display: block; opacity: 1; transform: translate(-50%,-50%); }
  .modal-head { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(17,21,31,.95); backdrop-filter: blur(8px); z-index: 2; }
  .modal-head h2 { margin: 0; font-size: 19px; font-weight: 650; }
  .modal-head .x { margin-left: auto; cursor: pointer; color: var(--muted); font-size: 24px; line-height: 1; border: 0; background: var(--panel2); width: 30px; height: 30px; border-radius: 8px; transition: background .15s, color .15s; }
  .modal-head .x:hover { color: var(--text); background: var(--panel3); }
  .msum { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 14px; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .msum .item { color: var(--faint); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .msum b { color: var(--text); font-size: 18px; display: block; font-weight: 650; margin-bottom: 2px; letter-spacing: -.3px; }
  .order { padding: 15px 22px; border-bottom: 1px solid var(--border); }
  .order:last-child { border-bottom: 0; }
  .order-top { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .side { font-weight: 700; padding: 3px 9px; border-radius: 6px; font-size: 10.5px; letter-spacing: .6px; }
  .side.b { background: var(--buy-dim); color: var(--buy); }
  .side.s { background: var(--sell-dim); color: var(--sell); }
  .order-top .sz { font-weight: 600; font-variant-numeric: tabular-nums; }
  .order-top .ago { margin-left: auto; color: var(--faint); font-size: 12px; }
  .st { font-size: 9.5px; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--border2); text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }
  .st.active { color: var(--buy); border-color: rgba(46,189,150,.5); background: var(--buy-dim); }
  .st.error { color: var(--sell); border-color: rgba(240,97,109,.4); background: var(--sell-dim); }
  .st.canceled { color: var(--faint); }
  .prog { margin-top: 11px; }
  .prog-bar { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .prog-meta { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--faint); margin-top: 6px; }
  .prog-meta .rem { color: var(--buy); font-variant-numeric: tabular-nums; font-weight: 600; }
  .err { color: var(--sell); padding: 30px 20px; text-align: center; }
  .err button { margin-top: 12px; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: s .7s linear infinite; vertical-align: -2px; }
  @keyframes s { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .tagline { display: none; }
    .wrap { padding: 16px 14px 50px; }
    .card .val { font-size: 22px; }
    .frow { grid-template-columns: 70px 1fr 78px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="pulse" title="Live"></span>
    <h1>TWAP <span class="accent">Flow</span></h1>
  </div>
  <span class="tagline">Hyperliquid TWAP orders aggregated by token · net buy(+) / sell(−)</span>
  <div class="header-right">
    <span class="updated" id="updated"></span>
    <label class="autorefresh" title="Auto-refresh every 30s">
      <input type="checkbox" id="autoRefresh" />
      <span class="switch"></span>
      <span id="autoLabel">Auto</span>
    </label>
    <button class="refresh" id="refresh">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      <span>Refresh</span>
    </button>
  </div>
</header>

<div class="wrap">
  <div id="cards"></div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search" placeholder="Filter token… (e.g. HYPE, NEAR)" />
    </div>
    <div class="divider"></div>
    <span class="ctl-label">Unit</span>
    <div class="seg" id="unitSeg">
      <button data-unit="usd" class="active">USD</button>
      <button data-unit="base">Base</button>
    </div>
    <span class="ctl-label">Window</span>
    <div class="seg" id="windowSeg">
      <button data-win="1">1h</button>
      <button data-win="6">6h</button>
      <button data-win="24">24h</button>
      <button data-win="all" class="active">All</button>
    </div>
    <select id="statusFilter"><option value="all">All statuses</option></select>
    <label class="chk"><input type="checkbox" id="activeOnly" /> Active now <span class="hint">(executing)</span></label>
  </div>

  <div id="flowchart"></div>
  <div id="content"></div>
  <div class="metafoot" id="meta"></div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="modal" id="modal"></div>

<script>
const HS = 'https://api.hypurrscan.io/twap/*';
const HL = 'https://api.hyperliquid.xyz/info';
const post = (body) => fetch(HL, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(body) }).then(r=>r.json());

const REFRESH_MS = 30000;
let STATE = { rows: [], orders: [], unit: 'usd', sortKey: 'netUsd', sortDir: -1, search: '', status: 'all',
              generatedAt: '', generatedMs: 0, windowH: 'all', activeOnly: false, span: '', selected: null,
              auto: false, statuses: ['all'] };
let autoTimer = null;

async function loadAll() {
  // 1. base data
  const [twaps, perpMeta, spotMeta, perpDexs, mids] = await Promise.all([
    fetch(HS).then(r=>r.json()),
    post({ type:'meta' }),
    post({ type:'spotMeta' }),
    post({ type:'perpDexs' }),
    post({ type:'allMids' }),
  ]);

  // 2. builder-dex metas + mids (skip index 0 = main dex)
  const dexList = perpDexs.map((d,i)=>({i, name: d && d.name})).filter(d=>d.name);
  const dexData = await Promise.all(dexList.map(async d => ({
    ...d,
    meta: await post({ type:'meta', dex: d.name }),
    mids: await post({ type:'allMids', dex: d.name }),
  })));

  // ---- resolvers ----
  const perpName = {}; perpMeta.universe.forEach((u,i)=> perpName[i]=u.name);
  const tokName = {}; spotMeta.tokens.forEach(t=> tokName[t.index]=t.name);
  const spotName = {}, spotMid = {};
  spotMeta.universe.forEach(u => {
    spotName[10000+u.index] = tokName[u.tokens[0]] || u.name;
    spotMid[10000+u.index]  = mids['@'+u.index];
  });
  const dexName = {}, dexMid = {};
  dexData.forEach(d => d.meta.universe.forEach((u,ai) => {
    const aid = 100000 + d.i*10000 + ai;
    const short = u.name.split(':').pop();
    dexName[aid] = d.name + ':' + short;
    dexMid[aid]  = d.mids[u.name];
  }));

  const resolve = (a) => {
    if (a >= 100000) return { name: dexName[a] || ('dex#'+a), price: dexMid[a], kind: 'builder' };
    if (a >= 10000)  return { name: spotName[a] || ('spot#'+(a-10000)), price: spotMid[a], kind: 'spot' };
    return { name: perpName[a] || ('perp#'+a), price: mids[perpName[a]], kind: 'perp' };
  };

  // ---- aggregate ----
  const statuses = new Set();
  STATE.orders = twaps.map(t => {
    const tw = t.action.twap;
    const r = resolve(tw.a);
    statuses.add(t.ended || 'active');
    return { name: r.name, kind: r.kind, price: r.price!=null ? parseFloat(r.price) : null,
             buy: tw.b, size: parseFloat(tw.s), ended: t.ended || 'active',
             time: t.time, durMs: tw.m * 60000, endTime: t.time + tw.m * 60000 };
  });
  STATE.statuses = ['all', ...[...statuses].sort()];
  const times = STATE.orders.map(o=>o.time);
  const lo = Math.min(...times), hi = Math.max(...times);
  const f = ms => new Date(ms).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  STATE.span = `${f(lo)} → ${f(hi)} (${((hi-lo)/3.6e6).toFixed(1)}h of feed)`;
  STATE.generatedMs = Date.now();
  STATE.generatedAt = new Date().toLocaleString();
  aggregate();
}

function aggregate() {
  const now = Date.now();
  const winMs = STATE.windowH === 'all' ? Infinity : STATE.windowH * 3.6e6;
  const m = new Map();
  let kept = 0, live = 0;
  for (const o of STATE.orders) {
    if (STATE.status !== 'all' && o.ended !== STATE.status) continue;
    if (now - o.time > winMs) continue;                          // placed-within window
    const isLive = o.ended === 'active' && now <= o.endTime;     // still executing
    if (STATE.activeOnly && !isLive) continue;
    kept++; if (isLive) live++;
    let g = m.get(o.name);
    if (!g) { g = { name:o.name, kind:o.kind, price:o.price, n:0, nb:0, ns:0, bSz:0, sSz:0, live:0 }; m.set(o.name, g); }
    g.n++; if (isLive) g.live++;
    if (o.buy) { g.nb++; g.bSz += o.size; } else { g.ns++; g.sSz += o.size; }
  }
  STATE.kept = kept; STATE.live = live;
  STATE.rows = [...m.values()].map(g => {
    const netSz = g.bSz - g.sSz;
    const p = g.price;
    return { ...g, netSz,
      bUsd: p!=null ? g.bSz*p : null, sUsd: p!=null ? g.sSz*p : null,
      netUsd: p!=null ? netSz*p : null };
  });
  render();
}

function fmt(n, dp=0) { return n==null ? '—' : n.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function fmtUsd(n) {
  if (n==null) return '—';
  const s = n<0?'-':'+'; const a = Math.abs(n);
  if (a>=1e6) return s+'$'+(a/1e6).toFixed(2)+'M';
  if (a>=1e3) return s+'$'+(a/1e3).toFixed(1)+'K';
  return s+'$'+a.toFixed(0);
}
function fmtUsdAbs(n) {
  if (n==null) return '—';
  const a = Math.abs(n);
  if (a>=1e6) return '$'+(a/1e6).toFixed(2)+'M';
  if (a>=1e3) return '$'+(a/1e3).toFixed(1)+'K';
  return '$'+a.toFixed(0);
}
function fmtPrice(p){ if(p==null) return '—'; return '$'+p.toLocaleString('en-US',{maximumFractionDigits: p<1?6:2}); }
const card = (label,val,foot,cls='')=>`<div class="card ${cls}"><div class="label">${label}</div><div class="val">${val}</div>${foot?`<div class="foot">${foot}</div>`:''}</div>`;

function render() {
  const usd = STATE.unit==='usd';
  let rows = STATE.rows.filter(r => r.name.toLowerCase().includes(STATE.search.toLowerCase()));
  const key = STATE.sortKey, dir = STATE.sortDir;
  rows.sort((a,b)=>{
    let av=a[key], bv=b[key];
    if (key==='netUsd' || key==='netSz') { av=Math.abs(av??-Infinity); bv=Math.abs(bv??-Infinity); }
    if (typeof av==='string') return av.localeCompare(bv)*dir;
    return ((av??-Infinity)-(bv??-Infinity))*dir;
  });

  // totals + buy/sell pressure
  const totUsd = STATE.rows.reduce((s,r)=> s + (r.netUsd||0), 0);
  const totOrders = STATE.rows.reduce((s,r)=> s+r.n, 0);
  const totBuyUsd = STATE.rows.reduce((s,r)=> s + (r.bUsd||0), 0);
  const totSellUsd = STATE.rows.reduce((s,r)=> s + (r.sUsd||0), 0);
  const grossUsd = totBuyUsd + totSellUsd;
  const buyPct = grossUsd > 0 ? totBuyUsd/grossUsd*100 : 50;
  const maxAbs = Math.max(...rows.map(r=> Math.abs((usd?r.netUsd:r.netSz)||0)), 1);

  // ---- KPI cards ----
  document.getElementById('cards').innerHTML = `<div class="cards">
    ${card('TWAP orders', `${fmt(totOrders)} <small class="livedot">· ${fmt(STATE.live)} live</small>`, STATE.windowH==='all'?'across full feed':'in last '+STATE.windowH+'h')}
    ${card('Distinct tokens', fmt(STATE.rows.length), 'with TWAP activity')}
    ${card('Net flow', `<span class="${totUsd>=0?'buy':'sell'}">${fmtUsd(totUsd)}</span>`, totUsd>=0?'net buying pressure':'net selling pressure', totUsd>=0?'buyaccent':'sellaccent')}
    <div class="card ${buyPct>=50?'buyaccent':'sellaccent'}">
      <div class="label">Buy / Sell balance</div>
      <div class="val" style="font-size:20px">${buyPct>=50?'<span class="buy">'+buyPct.toFixed(0)+'% BUY</span>':'<span class="sell">'+(100-buyPct).toFixed(0)+'% SELL</span>'}</div>
      <div class="gauge">
        <div class="gauge-track"><div class="gauge-buy" style="width:${buyPct.toFixed(1)}%"></div></div>
        <div class="gauge-labels"><span class="buy">${fmtUsdAbs(totBuyUsd)}</span><span class="sell">${fmtUsdAbs(totSellUsd)}</span></div>
      </div>
    </div>
  </div>`;

  // ---- top net-flow chart ----
  renderFlowChart(rows, usd);

  if (rows.length === 0) {
    document.getElementById('content').innerHTML = `<div class="table-wrap"><div class="empty"><div class="big">No TWAP orders match</div>Try widening the window or clearing filters.</div></div>`;
  } else {
    const col = (k,label)=>`<th data-key="${k}">${label}${STATE.sortKey===k?` <span class="arrow">${dir<0?'▼':'▲'}</span>`:''}</th>`;
    const head = `<tr>
      ${col('name','Token')}${col('n','Orders')}${col('live','Live')}<th>Buy / Sell</th>
      ${col('price','Price')}
      ${usd?col('bUsd','Buy $'):col('bSz','Buy size')}
      ${usd?col('sUsd','Sell $'):col('sSz','Sell size')}
      ${usd?col('netUsd','Net $'):col('netSz','Net size')}
    </tr>`;

    const body = rows.map(r=>{
      const net = usd?r.netUsd:r.netSz;
      const cls = net>0?'buy':net<0?'sell':'';
      const barW = Math.round(Math.abs(net||0)/maxAbs*54);
      const bar = `<span class="netbar" style="width:${barW}px;background:${net>=0?'var(--buy)':'var(--sell)'}"></span>`;
      const kindBadge = r.kind!=='perp' ? `<span class="badge">${r.kind}</span>` : '';
      return `<tr data-token="${r.name.replace(/"/g,'&quot;')}">
        <td class="tok">${r.name}${kindBadge}</td>
        <td class="num">${r.n}</td>
        <td class="num ${r.live?'livedot':''}">${r.live?'● '+r.live:'—'}</td>
        <td class="bs"><span class="buy">${r.nb}</span> <span style="color:var(--faint)">/</span> <span class="sell">${r.ns}</span></td>
        <td class="num">${fmtPrice(r.price)}</td>
        <td class="num buy">${usd?(r.bUsd!=null?'$'+fmt(r.bUsd):'—'):fmt(r.bSz,1)}</td>
        <td class="num sell">${usd?(r.sUsd!=null?'$'+fmt(r.sUsd):'—'):fmt(r.sSz,1)}</td>
        <td class="num ${cls}"><span class="net-cell">${usd?fmtUsd(net):(net>=0?'+':'')+fmt(net,1)}${bar}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `<div class="table-wrap"><div class="table-scroll"><table><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;

    document.querySelectorAll('thead th[data-key]').forEach(th=>{
      th.onclick = ()=>{ const k=th.dataset.key; if(STATE.sortKey===k) STATE.sortDir*=-1; else {STATE.sortKey=k; STATE.sortDir=(k==='name'?1:-1);} render(); };
    });
    document.querySelectorAll('tbody tr[data-token]').forEach(tr=>{
      tr.onclick = ()=> openToken(tr.dataset.token);
    });
  }

  const winLbl = STATE.windowH==='all' ? 'all (~24h feed)' : 'last '+STATE.windowH+'h';
  document.getElementById('meta').innerHTML = `Feed span: ${STATE.span} · window: ${winLbl}${STATE.activeOnly?' · active-now only':''} · ${STATE.status==='all'?'all statuses':'status: '+STATE.status}<br>
    Generated ${STATE.generatedAt} · <span class="livedot">●</span> live = TWAP currently executing (now within its <code>time → time+duration</code>) · prices are current marks (notional) · data: <a href="https://hypurrscan.io" target="_blank" rel="noopener">hypurrscan</a> + <a href="https://hyperliquid.xyz" target="_blank" rel="noopener">Hyperliquid</a>`;
  updateClock();
}

function renderFlowChart(rows, usd) {
  // top 8 by absolute net flow
  const top = [...rows].sort((a,b)=> Math.abs((usd?b.netUsd:b.netSz)||0) - Math.abs((usd?a.netUsd:a.netSz)||0)).slice(0, 8);
  if (top.length === 0) { document.getElementById('flowchart').innerHTML = ''; return; }
  const maxAbs = Math.max(...top.map(r=> Math.abs((usd?r.netUsd:r.netSz)||0)), 1);
  const fval = v => usd ? fmtUsd(v) : (v>=0?'+':'')+fmt(v,1);
  const rowsHtml = top.map(r=>{
    const net = (usd?r.netUsd:r.netSz) || 0;
    const w = Math.abs(net)/maxAbs*100;
    const bar = net>=0
      ? `<div class="fbar b" style="width:${(w/2).toFixed(1)}%"></div>`
      : `<div class="fbar s" style="width:${(w/2).toFixed(1)}%"></div>`;
    const valSide = net>=0
      ? `<div class="fval b buy">${fval(net)}</div>`
      : `<div class="fval s sell">${fval(net)}</div>`;
    return `<div class="frow" data-token="${r.name.replace(/"/g,'&quot;')}">
      <div class="ftok">${r.name}</div>
      <div class="ftrack"><div class="mid"></div>${bar}</div>
      ${valSide}
    </div>`;
  }).join('');
  document.getElementById('flowchart').innerHTML = `<div class="flowchart">
    <div class="flowchart-head"><h3>Net flow by token</h3><span>top ${top.length} · ${usd?'USD notional':'base units'} · ← sell / buy →</span></div>
    ${rowsHtml}
  </div>`;
  document.querySelectorAll('.frow[data-token]').forEach(fr=> fr.onclick = ()=> openToken(fr.dataset.token));
}

function updateClock() {
  if (!STATE.generatedMs) return;
  const sec = Math.round((Date.now()-STATE.generatedMs)/1000);
  let ago = sec < 5 ? 'just now' : sec < 60 ? sec+'s ago' : Math.floor(sec/60)+'m '+(sec%60)+'s ago';
  let auto = '';
  if (STATE.auto && autoNextMs) {
    const left = Math.max(0, Math.round((autoNextMs-Date.now())/1000));
    auto = ` · <b>next in ${left}s</b>`;
  }
  document.getElementById('updated').innerHTML = `<span class="pulse" style="width:7px;height:7px"></span> updated <b>${ago}</b>${auto}`;
}

// ---- token detail (per-order progress + time remaining) ----
function fmtDur(ms){
  const m = Math.round(ms/60000);
  if (m < 60) return m+'m';
  const h = Math.floor(m/60), mm = m%60;
  return mm ? `${h}h ${mm}m` : `${h}h`;
}
function relTime(ms){
  const d = Date.now()-ms, m = Math.round(d/60000);
  if (m < 1) return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h '+(m%60)+'m ago';
  return Math.floor(h/24)+'d ago';
}
function openToken(name){
  STATE.selected = name;
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('modal').classList.add('open');
  renderDetail();
}
function closeModal(){
  STATE.selected = null;
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
}
function renderDetail(){
  if (!STATE.selected) return;
  const now = Date.now();
  const orders = STATE.orders.filter(o=>o.name===STATE.selected).sort((a,b)=> b.time - a.time);
  const live = orders.filter(o=> o.ended==='active' && now<=o.endTime);
  const px = orders[0]?.price;
  const netSz = orders.reduce((s,o)=> s + (o.buy?o.size:-o.size), 0);
  const netUsd = px!=null ? netSz*px : null;
  const kind = orders[0]?.kind;

  const head = `<div class="modal-head">
    <h2>${STATE.selected}</h2>${kind&&kind!=='perp'?`<span class="badge">${kind}</span>`:''}
    <button class="x" onclick="closeModal()">×</button>
  </div>
  <div class="msum">
    <div class="item"><b>${orders.length}</b>orders</div>
    <div class="item"><b class="livedot">${live.length}</b>live now</div>
    <div class="item"><b>${fmtPrice(px)}</b>mark price</div>
    <div class="item"><b class="${netUsd>=0?'buy':'sell'}">${netUsd!=null?fmtUsd(netUsd):(netSz>=0?'+':'')+fmt(netSz,1)}</b>net flow</div>
  </div>`;

  const body = orders.map(o=>{
    const dur = o.endTime - o.time;
    const isLive = o.ended==='active' && now<=o.endTime;
    const prog = Math.max(0, Math.min(1, (now-o.time)/dur));
    const remMs = o.endTime - now;
    const usd = o.price!=null ? o.size*o.price : null;
    let remTxt, barColor;
    if (isLive){ remTxt = `<span class="rem">${fmtDur(remMs)} left</span>`; barColor = o.buy?'var(--buy)':'var(--sell)'; }
    else if (o.ended==='active'){ remTxt = 'finishing…'; barColor = 'var(--muted)'; }
    else { remTxt = o.ended==='canceled'?'canceled':'ended (error)'; barColor = 'var(--border2)'; }
    const pct = (o.ended==='active') ? prog : 1;
    return `<div class="order">
      <div class="order-top">
        <span class="side ${o.buy?'b':'s'}">${o.buy?'BUY':'SELL'}</span>
        <span class="sz">${fmt(o.size, o.size<10?2:1)}${usd!=null?` · $${fmt(usd)}`:''}</span>
        <span class="st ${o.ended}">${o.ended}</span>
        <span class="ago">${relTime(o.time)} · ${fmtDur(dur)} TWAP</span>
      </div>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${(pct*100).toFixed(1)}%;background:${barColor}"></div></div>
        <div class="prog-meta"><span>${(pct*100).toFixed(0)}% elapsed</span>${remTxt}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal').innerHTML = head + body;
}
// tick live countdowns + "updated Xs ago" once per second
setInterval(()=>{ if (STATE.selected) renderDetail(); updateClock(); }, 1000);

// ---- skeleton while loading ----
function showSkeleton() {
  document.getElementById('cards').innerHTML = `<div class="skel-cards">${'<div class="skel card-s"></div>'.repeat(4)}</div>`;
  document.getElementById('flowchart').innerHTML = '';
  document.getElementById('content').innerHTML =
    `<div class="loading-line"><span class="spin"></span> Fetching TWAPs, metadata &amp; prices…</div>
     <div class="table-wrap">${'<div class="skel row-s"></div>'.repeat(8)}</div>`;
}

// ---- wiring ----
document.getElementById('search').oninput = e => { STATE.search=e.target.value; render(); };
document.getElementById('unitSeg').onclick = e => {
  if(!e.target.dataset.unit) return;
  STATE.unit=e.target.dataset.unit;
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('active', b===e.target));
  STATE.sortKey = STATE.unit==='usd'?'netUsd':'netSz'; render();
};
document.getElementById('statusFilter').onchange = e => { STATE.status=e.target.value; aggregate(); };
document.getElementById('windowSeg').onclick = e => {
  if(!e.target.dataset.win) return;
  STATE.windowH = e.target.dataset.win==='all' ? 'all' : +e.target.dataset.win;
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('active', b===e.target));
  aggregate();
};
document.getElementById('activeOnly').onchange = e => { STATE.activeOnly=e.target.checked; aggregate(); };
document.getElementById('backdrop').onclick = closeModal;
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='/' && document.activeElement.tagName!=='INPUT') { e.preventDefault(); document.getElementById('search').focus(); }
});

let autoNextMs = 0;
function setupAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoNextMs = 0;
  if (STATE.auto) {
    autoNextMs = Date.now() + REFRESH_MS;
    autoTimer = setInterval(()=>{ autoNextMs = Date.now() + REFRESH_MS; refresh(); }, REFRESH_MS);
  }
}
document.getElementById('autoRefresh').onchange = e => { STATE.auto = e.target.checked; setupAuto(); updateClock(); };

async function refresh() {
  const btn=document.getElementById('refresh'); btn.disabled=true;
  btn.querySelector('span').textContent='Loading…';
  if (!STATE.orders.length) showSkeleton();
  try {
    await loadAll();
    const sel=document.getElementById('statusFilter');
    sel.innerHTML = STATE.statuses.map(s=>`<option value="${s}">${s==='all'?'All statuses':s}</option>`).join('');
    sel.value = STATE.status;
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="table-wrap"><div class="err">Failed to load: ${err.message}.<br>The public APIs may be rate-limiting.<br><button class="refresh" onclick="refresh()">Try again</button></div></div>`;
  } finally {
    btn.disabled=false; btn.querySelector('span').textContent='Refresh';
    if (STATE.auto) autoNextMs = Date.now() + REFRESH_MS;
  }
}
document.getElementById('refresh').onclick = refresh;
refresh();
</script>
</body>
</html>
